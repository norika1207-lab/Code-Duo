<svg width="1440" height="864" viewBox="0 0 1440 864" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,system-ui,sans-serif">
  <defs>
    <style>
      .txt{fill:#e6e8ee} .dim{fill:#8b90a0} .cl{fill:#d97757} .cx{fill:#5b8def} .both{fill:#10a37f}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
      .b{font-weight:700}
    </style>
  </defs>

  <!-- background -->
  <rect width="1440" height="864" fill="#0e0f13"/>

  <!-- ===== header ===== -->
  <rect x="0" y="0" width="1440" height="44" fill="#0e0f13"/>
  <line x1="0" y1="44" x2="1440" y2="44" stroke="#252834"/>
  <rect x="14" y="11" width="22" height="22" rx="6" fill="#16181f" stroke="#2a2f40"/>
  <path d="M22 16 L17 22 L22 28" fill="none" stroke="#d97757" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M30 16 L35 22 L30 28" fill="none" stroke="#5b8def" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="15" x2="26" y2="29" stroke="#10a37f" stroke-width="1.6" stroke-linecap="round"/>
  <text x="46" y="29" class="txt b" font-size="16">Code Duo</text>
  <text x="132" y="29" class="dim" font-size="12.5">Claude × Codex · one window · subscription, no API</text>
  <text x="1150" y="28" class="dim" font-size="11">Project: demo-api</text>
  <rect x="1244" y="13" width="86" height="20" rx="6" fill="#16181f" stroke="#252834"/>
  <text x="1287" y="27" class="txt" font-size="11" text-anchor="middle">Set project</text>
  <rect x="1340" y="13" width="86" height="20" rx="6" fill="#16181f" stroke="#252834"/>
  <text x="1383" y="27" class="txt" font-size="11" text-anchor="middle">Clear chat</text>

