  <text x="1424" y="156" class="cx b" font-size="12.5" text-anchor="end">+ New chat</text>
  <line x1="1220" y1="166" x2="1440" y2="166" stroke="#252834"/>
  <circle cx="1236" cy="183" r="4" fill="#5b8def"/>
  <text x="1248" y="187" class="dim" font-size="12">Codex history</text>
  <text x="1370" y="187" class="dim" font-size="11">Archived</text>
  <text x="1424" y="187" class="dim" font-size="12" text-anchor="end">⟳</text>
  <line x1="1220" y1="196" x2="1440" y2="196" stroke="#252834"/>
  <text x="1234" y="218" font-size="11" fill="#aab b">▾ Lobster Dashboard</text><text x="1424" y="218" class="dim" font-size="11" text-anchor="end">2</text>
  <text x="1246" y="240" class="dim" font-size="10">○</text><text x="1260" y="240" class="txt" font-size="12.5">GA4 funnel report</text>
  <text x="1246" y="262" class="dim" font-size="10">○</text><text x="1260" y="262" class="txt" font-size="12.5">MBTI card layout</text>
  <text x="1234" y="290" font-size="11" fill="#aab b">▸ scraper</text><text x="1424" y="290" class="dim" font-size="11" text-anchor="end">3</text>

  <!-- ===== footer ===== -->
  <line x1="0" y1="808" x2="1440" y2="808" stroke="#252834"/>
  <rect x="0" y="808" width="1440" height="56" fill="#0e0f13"/>
  <rect x="14" y="820" width="36" height="32" rx="8" fill="#16181f" stroke="#252834"/>
