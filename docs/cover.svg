  <line x1="721" y1="734" x2="1220" y2="734" stroke="#252834"/>
  <rect x="721" y="734" width="499" height="36" fill="#101218"/>
  <text x="737" y="756" class="dim" font-size="11">idle</text>
  <rect x="770" y="744" width="78" height="18" rx="5" fill="#1a1d26" stroke="#252834"/><text x="809" y="757" class="txt" font-size="10.5" text-anchor="middle">GPT-5.5</text>
  <rect x="856" y="744" width="118" height="18" rx="5" fill="#1a1d26" stroke="#252834"/><text x="915" y="757" class="txt" font-size="10.5" text-anchor="middle">Workspace-write</text>
  <rect x="982" y="744" width="78" height="18" rx="5" fill="#1a1d26" stroke="#252834"/><text x="1021" y="757" class="txt" font-size="10.5" text-anchor="middle">Reasoning</text>

