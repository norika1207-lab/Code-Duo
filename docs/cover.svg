  <text x="26" y="240" class="dim" font-size="10">○</text><text x="40" y="240" class="txt" font-size="12.5">Add rate limiting</text>
  <text x="26" y="262" class="dim" font-size="10">○</text><text x="40" y="262" class="txt" font-size="12.5">Refactor token check</text>
  <text x="26" y="284" class="dim" font-size="10">○</text><text x="40" y="284" class="txt" font-size="12.5">Fix login redirect</text>
  <text x="14" y="312" font-size="11" fill="#aab b">▸ ungrouped</text><text x="200" y="312" class="dim" font-size="11" text-anchor="end">2</text>

