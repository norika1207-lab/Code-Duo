  <line x1="221" y1="734" x2="720" y2="734" stroke="#252834"/>
  <rect x="221" y="734" width="499" height="36" fill="#101218"/>
  <text x="237" y="756" class="dim" font-size="11">idle</text>
  <rect x="270" y="744" width="80" height="18" rx="5" fill="#1a1d26" stroke="#252834"/><text x="310" y="757" class="txt" font-size="10.5" text-anchor="middle">Opus 4.8</text>
  <rect x="358" y="744" width="92" height="18" rx="5" fill="#1a1d26" stroke="#252834"/><text x="404" y="757" class="txt" font-size="10.5" text-anchor="middle">Accept edits</text>
  <rect x="458" y="744" width="56" height="18" rx="5" fill="#1a1d26" stroke="#252834"/><text x="486" y="757" class="txt" font-size="10.5" text-anchor="middle">High</text>
  <rect x="522" y="744" width="52" height="18" rx="5" fill="#3a2d10" stroke="#caa23a"/><text x="548" y="757" font-size="10.5" fill="#ffd970" text-anchor="middle">⚡Fast</text>

  <!-- Codex conversation column -->
  <rect x="721" y="130" width="499" height="640" fill="#16181f"/>
  <rect x="1000" y="148" width="3" height="18" fill="#5b8def"/>
  <text x="1012" y="155" class="dim" font-size="11">You</text>
  <text x="1012" y="172" class="txt" font-size="13">Add rate limiting to the /api routes</text>
  <text x="737" y="200" class="dim" font-size="11">codex · 11.1s</text>
  <rect x="737" y="210" width="3" height="40" fill="#252834"/>
  <text x="748" y="223" class="dim mono" font-size="11.5">⌘ rg "router" src</text>
  <text x="748" y="241" class="dim mono" font-size="11.5">✎ edited src/api/router.ts</text>
  <text x="737" y="270" class="txt" font-size="13">Wrapped the router with a token-bucket middleware and</text>
  <text x="737" y="289" class="txt" font-size="13">added the window config in <tspan class="mono" fill="#cdd3df">api/config.ts</tspan>.</text>
  <rect x="737" y="304" width="120" height="22" rx="6" fill="#11141b" stroke="#252834"/>
  <text x="797" y="319" class="dim" font-size="11" text-anchor="middle">→ Hand to Claude</text>
  <rect x="864" y="304" width="112" height="22" rx="6" fill="#11141b" stroke="#252834"/>
  <text x="920" y="319" class="dim" font-size="11" text-anchor="middle">→ Claude review</text>
