  <!-- token card: Claude -->
  <rect x="232" y="84" width="478" height="38" rx="10" fill="#16181f" stroke="#252834"/>
  <text x="252" y="108" class="cl b" font-size="13">Claude</text>
  <text x="330" y="103" class="txt b" font-size="14">$4.20</text><text x="330" y="116" class="dim" font-size="9">cost</text>
  <text x="420" y="103" class="txt b" font-size="14">12.4M</text><text x="420" y="116" class="dim" font-size="9">tokens</text>
  <text x="510" y="103" class="txt b" font-size="14">94%</text><text x="510" y="116" class="dim" font-size="9">cache hit</text>
  <text x="585" y="103" class="txt b" font-size="14">5</text><text x="585" y="116" class="dim" font-size="9">sessions</text>
  <rect x="628" y="93" width="68" height="20" rx="7" fill="#11141b" stroke="#252834"/>
  <text x="662" y="107" class="dim" font-size="10" text-anchor="middle">Clear cache</text>
  <!-- token card: Codex -->
  <rect x="730" y="84" width="478" height="38" rx="10" fill="#16181f" stroke="#252834"/>
  <text x="750" y="108" class="cx b" font-size="13">Codex</text>
  <text x="828" y="103" class="txt b" font-size="14">$1.80</text><text x="828" y="116" class="dim" font-size="9">cost</text>
  <text x="918" y="103" class="txt b" font-size="14">3.1M</text><text x="918" y="116" class="dim" font-size="9">tokens</text>
  <text x="1008" y="103" class="txt b" font-size="14">88%</text><text x="1008" y="116" class="dim" font-size="9">cache hit</text>
  <text x="1083" y="103" class="txt b" font-size="14">4</text><text x="1083" y="116" class="dim" font-size="9">sessions</text>
