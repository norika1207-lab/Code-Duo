  <rect x="58" y="820" width="64" height="32" rx="8" fill="#16181f" stroke="#252834"/><text x="90" y="840" class="txt" font-size="12" text-anchor="middle">Claude</text>
  <rect x="128" y="820" width="64" height="32" rx="8" fill="#16181f" stroke="#252834"/><text x="160" y="840" class="txt" font-size="12" text-anchor="middle">Codex</text>
  <rect x="198" y="820" width="60" height="32" rx="8" fill="#1d2740" stroke="#10a37f"/><text x="228" y="840" class="txt" font-size="12" text-anchor="middle">Both</text>
  <rect x="268" y="820" width="58" height="32" rx="8" fill="#11141b" stroke="#252834"/><text x="297" y="840" class="both b" font-size="13" text-anchor="middle">Both:</text>
  <rect x="326" y="820" width="1058" height="32" rx="8" fill="#0e0f13" stroke="#252834"/>
  <text x="340" y="840" class="dim" font-size="13">Press Tab to switch Claude / Codex / Both…</text>
  <rect x="1392" y="824" width="28" height="24" rx="7" fill="#5b8def"/><text x="1406" y="841" fill="#fff" font-size="13" text-anchor="middle">↵</text>
