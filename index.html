<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Code Duo — Claude × Codex</title>
<link rel="icon" href="/logo.svg">
<style>
  :root{
    --bg:#0e0f13; --panel:#16181f; --rail:#121419; --line:#252834; --txt:#e6e8ee; --dim:#8b90a0;
    --claude:#d97757; --codex:#5b8def; --both:#10a37f; --user:#5b8def;
  }
  *{box-sizing:border-box}
  html,body{width:100%;overflow-x:hidden}
  body{margin:0;height:100vh;width:100vw;overflow:hidden;display:flex;flex-direction:column;
       background:var(--bg);color:var(--txt);font:14px/1.6 -apple-system,system-ui,"Segoe UI",sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:3px 14px;border-bottom:1px solid var(--line)}
  button.mini{padding:3px 9px;font-size:11px;border-radius:6px}
  .brand{display:flex;align-items:center;gap:8px}
  .brand .mark{display:block;flex:none}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--dim);font-size:12px}
  header .right{margin-left:auto;display:flex;gap:8px}
  button{background:var(--panel);color:var(--txt);border:1px solid var(--line);
          border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px}
  button:hover{border-color:#3a3f50}

  /* per-column bottom control bar: model / mode / effort / usage */
  .cfgbar{display:flex;align-items:center;gap:7px;padding:4px 12px;border-top:1px solid var(--line);
          background:#101218;flex:none;flex-wrap:wrap}
  .cfgbar .tag{font-size:11px;color:var(--dim);flex:none}
  .cfgbar select{background:#1a1d26;color:var(--txt);border:1px solid var(--line);border-radius:6px;
                 padding:3px 6px;font-size:11px;cursor:pointer;max-width:128px}
  .cfgbar select:hover{border-color:#3a3f50}
  .cfgbar .fastbtn{padding:3px 9px;font-size:11px;border-radius:6px;background:#1a1d26;
                   border:1px solid var(--line);color:var(--dim);cursor:pointer}
  .cfgbar .fastbtn.on{background:#3a2d10;border-color:#caa23a;color:#ffd970}
  .cfgbar .usechip{margin-left:auto;font-size:11px;color:var(--dim)}

  /* top panels: token usage + watchdog */
  .panels{padding:4px 0;display:flex;flex-direction:column;gap:4px;
          background:#101218;border-bottom:1px solid var(--line)}
  .prow{display:flex;align-items:center;min-height:26px}
  .plabel,.pright{width:230px;flex:none}
  .tcards{display:flex;gap:10px;flex:1;min-width:0}
  .tcard{flex:1;min-width:0;display:flex;align-items:center;gap:14px;
         background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px 20px}
  .tcard .vn{flex:none;font-size:12px;font-weight:700}
  .kgroup{flex:1;display:flex;align-items:center;justify-content:space-evenly;gap:10px;min-width:0}
  .tcard .clearbtn{flex:none}
  .tcard.claude .vn{color:var(--claude)} .tcard.codex .vn{color:var(--codex)}
  .tcard .kpi{display:flex;flex-direction:column;line-height:1.15}
  .tcard .kpi b{font-size:13px;font-weight:700}
  .tcard .kpi span{font-size:9px;color:var(--dim);letter-spacing:.3px}
  .clearbtn{font-size:10px;padding:4px 9px;border-radius:7px;background:#11141b;
            border:1px solid var(--line);color:var(--dim);cursor:pointer;margin-left:4px}
  .clearbtn:hover{border-color:var(--user);color:#fff}
  .bstrip{display:flex;gap:8px;flex:1;min-width:0;align-items:center;flex-wrap:wrap}
  .bnote{color:var(--dim);font-size:12px}
  .bpill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;
         font-size:11px;border:1px solid var(--line);color:var(--dim);white-space:nowrap}
  .bpill.ok{color:#4ad07a;border-color:#1f5a36;background:#0f1f16}
  .bpill.warn{color:#ff8a8a;border-color:#7a2a2a;background:#241313}
  .bpill.circle{color:#fff;border-color:#c0392b;background:#7a1f15;font-weight:700;
                animation:circlepulse 1.4s ease-in-out infinite}
  @keyframes circlepulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}50%{box-shadow:0 0 0 5px rgba(192,57,43,0)}}
  .stage{flex:1;display:flex;gap:1px;overflow:hidden}

  /* side history rails */
  .rail{width:230px;flex:none;background:var(--rail);display:flex;flex-direction:column;overflow:hidden}
  .rail .newlink{padding:9px 14px 5px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;
                 align-items:center;gap:5px;white-space:nowrap;user-select:none}
  .rail.claude .newlink{justify-content:flex-start;color:var(--claude)}
  .rail.codex .newlink{justify-content:flex-end;color:var(--codex)}
  .rail .newlink:hover{filter:brightness(1.35);text-decoration:underline}
  .rail .rhead{padding:7px 12px;font-size:12px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
               display:flex;align-items:center;gap:6px;color:var(--dim)}
  .rail .rhead .d{width:8px;height:8px;border-radius:50%}
  .rail.claude .rhead .d{background:var(--claude)} .rail.codex .rhead .d{background:var(--codex)}
  .rail .rhead .rf{cursor:pointer}
  .rhead .hidtog{cursor:pointer;font-size:11px}
  .rhead .hidtog.on{color:var(--user)}
  .rlist{flex:1;overflow-y:auto;padding:6px}
  .ghead{display:flex;align-items:center;gap:5px;padding:6px 7px;margin-top:4px;cursor:pointer;
         font-size:11px;color:#aab;border-radius:6px;position:sticky;top:0;background:var(--rail)}
  .ghead:hover{background:#1b1e27}
  .ghead .gname{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ghead .gcount{margin-left:auto;color:#646a80}
  .ghead .arr{width:10px;display:inline-block;transition:transform .12s}
  .sgroup.collapsed .arr{transform:rotate(-90deg)}
  .sgroup.collapsed .gbody{display:none}
  .gbody{padding-left:6px}
  .sitem{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;
         border:1px solid transparent}
  .sitem:hover{background:#1b1e27}
  .sitem.active{background:#1d2740;border-color:var(--user)}
  .sitem .ico{color:#5a6075;font-size:10px;flex:none}
  .sitem .lbl{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .sitem .dots{flex:none;opacity:0;color:var(--dim);padding:0 4px;border-radius:4px;font-weight:700}
  .sitem:hover .dots{opacity:1}
  .sitem .dots:hover{background:#2a2f40;color:#fff}
  .sitem.pin .ico{color:var(--user)}
  .sitem.arch{opacity:.5}
  .ctxmenu{position:fixed;z-index:50;background:#1c1f28;border:1px solid var(--line);border-radius:8px;
           padding:4px;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .ctxmenu .ci{padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px}
  .ctxmenu .ci:hover{background:#2a3142}
  .ctxmenu .ci.danger{color:#e06}

  /* middle: the two conversation columns */
  .col{flex:1;display:flex;flex-direction:column;background:var(--panel);overflow:hidden;min-width:0}
  .log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
  /* flowing transcript text (Claude-Code style), not chat bubbles */
  .msg{max-width:100%;padding:4px 2px;word-break:break-word}
  .msg.user{border-left:2px solid var(--user);padding-left:10px;margin-top:6px}
  .msg.user .mdl{color:#cfe0ff}
  .msg.old{opacity:.6}
  .msg .who{font-size:11px;color:var(--dim);margin-bottom:2px}
  .msg.think{color:var(--dim);font-style:italic}
  .msg.sys{color:var(--dim);font-size:11px;border-left:2px solid var(--line);padding-left:10px}
  .mdl{line-height:1.55}
  .mdh{font-weight:700;font-size:14px;margin:9px 0 3px}
  .mdsp{height:8px}
  .msg ul{margin:3px 0;padding-left:20px}
  .msg li{line-height:1.5;margin:1px 0}
  code{background:#1e222c;border:1px solid var(--line);border-radius:5px;padding:1px 5px;
       font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
  pre.cb{background:#0f1219;border:1px solid var(--line);border-radius:8px;padding:10px 13px;
         overflow-x:auto;margin:7px 0}
  pre.cb code{background:none;border:none;padding:0;font-size:12px;white-space:pre;line-height:1.5}
  .msg .acts{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
  .msg .act{font-size:11px;padding:3px 8px;background:#11141b;border:1px solid var(--line);
            border-radius:6px;color:var(--dim);cursor:pointer}
  .msg .act:hover{border-color:var(--user);color:#fff}
  .projlabel{font-size:11px;color:var(--dim);max-width:200px;overflow:hidden;text-overflow:ellipsis;
             white-space:nowrap}
  .divider{align-self:center;color:var(--dim);font-size:11px;border-top:1px dashed var(--line);
           width:100%;text-align:center;padding-top:8px}

  footer{border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;align-items:flex-end}
  .targets{display:flex;gap:6px}
  .targets button{height:40px}
  .targets button.on{border-color:var(--user);color:#fff;background:#1d2740}
  .inputwrap{flex:1;position:relative;display:flex;align-items:stretch}
  .tgtprefix{display:flex;align-items:center;padding:0 12px;font-size:13px;font-weight:700;flex:none;
             border:1px solid var(--line);border-right:none;border-radius:10px 0 0 10px;
             background:#11141b;cursor:pointer;white-space:nowrap;user-select:none}
  .tgtprefix.claude{color:var(--claude)} .tgtprefix.codex{color:var(--codex)} .tgtprefix.both{color:var(--both)}
  textarea{flex:1;resize:none;background:var(--bg);color:var(--txt);border:1px solid var(--line);
           border-radius:0 10px 10px 0;padding:9px 44px 9px 12px;font:14px/1.4 inherit;height:40px;min-height:40px;max-height:160px}
  .sendico{position:absolute;right:6px;bottom:6px;width:28px;height:28px;padding:0;border-radius:7px;
           display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;
           background:var(--user);border-color:var(--user);color:#fff}
  .sendico:hover{filter:brightness(1.1)}
  .plus{width:36px;height:40px;flex:none;font-size:18px;line-height:1;color:var(--dim);
        background:var(--panel);border:1px solid var(--line);border-radius:8px;cursor:pointer}
  .plus:hover{border-color:var(--user);color:#fff}
  .inputwrap.drag textarea{border-color:var(--user);background:#16203a}
  .inputwrap.drag::after{content:"Drop to add files ⤵";position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;color:var(--user);font-size:12px;
    pointer-events:none;background:rgba(91,141,239,.08);border-radius:10px}
  .popmenu{position:fixed;z-index:60;background:#1c1f28;border:1px solid var(--line);border-radius:10px;
           padding:5px;min-width:220px;max-height:360px;overflow:auto;box-shadow:0 10px 30px rgba(0,0,0,.55)}
  .popmenu .pmhead{padding:5px 10px;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px;
                   border-bottom:1px solid var(--line);margin-bottom:4px}
  .popmenu .pmi{padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px;
                overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .popmenu .pmi:hover{background:#2a3142}
  .popmenu .ic{color:var(--dim);flex:none;width:15px;text-align:center}
  .popmenu .pmi.cl .ic{color:var(--claude)} .popmenu .pmi.cx .ic{color:var(--codex)}
</style>
</head>
<body>
  <header>
    <span class="brand">
      <svg class="mark" width="20" height="20" viewBox="0 0 120 120">
        <rect x="6" y="6" width="108" height="108" rx="26" fill="#16181f" stroke="#2a2f40" stroke-width="2"/>
        <path d="M47 38 L26 60 L47 82" fill="none" stroke="#d97757" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M73 38 L94 60 L73 82" fill="none" stroke="#5b8def" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="60" y1="34" x2="60" y2="86" stroke="#10a37f" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <h1>Code&nbsp;Duo</h1>
    </span>
    <span class="sub">Claude × Codex · one window · subscription, no API</span>
    <div class="right">
      <span id="projlabel" class="projlabel" title="Shared project directory for both agents">Project: none</span>
      <button id="setproj" class="mini">Set project</button>
      <button id="reset" class="mini">Clear chat</button>
    </div>
  </header>

  <div class="panels">
    <div class="prow"><span class="plabel"></span><div class="bstrip" id="bstrip">—</div><div class="pright"></div></div>
    <div class="prow"><span class="plabel"></span><div class="tcards" id="tcards">Loading…</div><div class="pright"></div></div>
  </div>

  <div class="stage">
    <!-- far left: Claude history -->
    <div class="rail claude">
      <a class="newlink cl" data-e="claude" title="Start a new conversation (reset session)">+ New chat</a>
      <div class="rhead"><span class="d"></span>Claude history<span class="hidtog" data-e="claude" title="Show/hide archived">Archived</span><span class="rf" data-e="claude" title="Refresh">⟳</span></div>
      <div class="rlist" id="rail-claude">Loading…</div>
    </div>

    <!-- center left: Claude conversation -->
    <div class="col claude">
      <div class="log" id="log-claude"></div>
      <div class="cfgbar" data-e="claude"><span class="tag" id="t-claude">idle</span></div>
    </div>

    <!-- center right: Codex conversation -->
    <div class="col codex">
      <div class="log" id="log-codex"></div>
      <div class="cfgbar" data-e="codex"><span class="tag" id="t-codex">idle</span></div>
    </div>

    <!-- far right: Codex history -->
    <div class="rail codex">
      <a class="newlink cx" data-e="codex" title="Start a new conversation (reset session)">+ New chat</a>
      <div class="rhead"><span class="d"></span>Codex history<span class="hidtog" data-e="codex" title="Show/hide archived">Archived</span><span class="rf" data-e="codex" title="Refresh">⟳</span></div>
      <div class="rlist" id="rail-codex">Loading…</div>
    </div>
  </div>

  <footer>
    <button class="plus" id="plusbtn" title="Add files (upload / drag / browse project)">+</button>
    <input type="file" id="fileinput" multiple hidden>
    <div class="targets">
      <button data-t="claude">Claude</button>
      <button data-t="codex">Codex</button>
      <button data-t="both" class="on">Both</button>
    </div>
    <div class="inputwrap">
      <span class="tgtprefix both" id="tgtprefix" title="Press Tab to switch target">Both:</span>
      <textarea id="box" placeholder="Press Tab to switch Claude / Codex / Both…"></textarea>
      <button class="sendico" id="send" title="Send (Enter)">↵</button>
    </div>
  </footer>

<script>
let target="both";
const box=document.getElementById("box");
const logs={claude:document.getElementById("log-claude"),codex:document.getElementById("log-codex")};
const tags={claude:document.getElementById("t-claude"),codex:document.getElementById("t-codex")};
const rails={claude:document.getElementById("rail-claude"),codex:document.getElementById("rail-codex")};

const TGT_ORDER=["claude","codex","both"];
const TGT_NAME={claude:"Claude",codex:"Codex",both:"Both"};
function setTarget(t){
  target=t;
  document.querySelectorAll(".targets button").forEach(x=>x.classList.toggle("on",x.dataset.t===t));
  const pre=document.getElementById("tgtprefix");
  pre.textContent=TGT_NAME[t]+":";
  pre.className="tgtprefix "+t;
}
document.querySelectorAll(".targets button").forEach(b=>b.onclick=()=>setTarget(b.dataset.t));
document.getElementById("tgtprefix").onclick=()=>setTarget(TGT_ORDER[(TGT_ORDER.indexOf(target)+1)%3]);
setTarget("both");
// global Tab capture: cycle target regardless of focus, never let focus wander
document.addEventListener("keydown",e=>{
  if(e.key==="Tab"){
    e.preventDefault();e.stopPropagation();
    const dir=e.shiftKey?-1:1;
    setTarget(TGT_ORDER[(TGT_ORDER.indexOf(target)+dir+3)%3]);
    box.focus();
  }
},true);
box.focus();

function add(col,cls,who,text){
  const d=document.createElement("div");d.className="msg "+cls;
  d.innerHTML=(who?`<div class="who">${escapeHtml(who)}</div>`:"")+md(text);
  logs[col].appendChild(d);logs[col].scrollTop=logs[col].scrollHeight;return d;
}
function escapeHtml(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
// minimal markdown -> HTML (escape first, then headings/lists/inline code/code blocks)
function md(raw){
  let s=escapeHtml(raw||"");
  const cb=[];
  s=s.replace(/```[^\n]*\n?([\s\S]*?)```/g,(m,code)=>{cb.push(code.replace(/\n+$/,""));return "\n@@CB"+(cb.length-1)+"@@\n";});
  const inl=x=>x.replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  let html="",list=false;const closeL=()=>{if(list){html+="</ul>";list=false;}};
  for(const ln of s.split("\n")){
    let m;
    if(m=ln.match(/^@@CB(\d+)@@$/)){closeL();html+='<pre class="cb"><code>'+cb[+m[1]]+"</code></pre>";continue;}
    if(m=ln.match(/^(#{1,4})\s+(.*)$/)){closeL();html+='<div class="mdh">'+inl(m[2])+"</div>";continue;}
    if(m=ln.match(/^\s*[-*]\s+(.*)$/)){if(!list){html+="<ul>";list=true;}html+="<li>"+inl(m[1])+"</li>";continue;}
    closeL();
    html+=ln.trim()===""?'<div class="mdsp"></div>':'<div class="mdl">'+inl(ln)+"</div>";
  }
  closeL();return html;
}

// bot reply + hand-off / review actions (pass this message to the other agent)
function renderBot(engine,res,label){
  const other=engine==="claude"?"codex":"claude";
  const oName=other.charAt(0).toUpperCase()+other.slice(1);
  const txt=(res&&res.text)||"[empty]";
  const d=document.createElement("div");d.className="msg bot";
  if(res&&!res.ok)d.style.borderColor="#a33";
  d.innerHTML=`<div class="who">${escapeHtml(label)}</div>${md(txt)}`
    +`<div class="acts"><button class="act" data-a="handoff">→ Hand to ${oName}</button>`
    +`<button class="act" data-a="audit">→ ${oName} review</button></div>`;
  d.querySelector('[data-a="handoff"]').onclick=()=>crossFeed(other,"handoff",txt);
  d.querySelector('[data-a="audit"]').onclick=()=>crossFeed(other,"audit",txt);
  logs[engine].appendChild(d);logs[engine].scrollTop=logs[engine].scrollHeight;return d;
}

// send some text to one engine, render the result in its column
async function runOne(engine,text,sysNote){
  if(sysNote)add(engine,"sys","",sysNote);
  tags[engine].textContent="thinking…";
  const think=add(engine,"bot think","","▍ thinking…");
  try{
    const r=await fetch("/api/send",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({target:engine,text})});
    const data=await r.json();
    think.remove();tags[engine].textContent="idle";
    const res=data[engine];
    if(!res){add(engine,"bot","System","[no response] "+(data.error||""));return;}
    renderBot(engine,res,engine+" · "+(res.ms/1000).toFixed(1)+"s");
  }catch(e){think.remove();tags[engine].textContent="idle";add(engine,"bot","System","[request failed] "+e);}
}

// cross-feed: build a hand-off or review prompt from the other side's output
function crossFeed(target,mode,srcText){
  const src=target==="claude"?"Codex":"Claude";
  let prompt,note;
  if(mode==="handoff"){
    note=`↩ Taking over ${src}'s last message`;
    prompt=`Below is ${src}'s work on the current task. Take over: first understand what it did, judge whether there are issues, then continue and get it right. The project is your working directory; read the files to verify.\n\n--- ${src}'s output ---\n${srcText}`;
  }else{
    note=`🔍 Reviewing ${src}'s last message`;
    prompt=`Review ${src}'s work below: point out errors, risks, omissions or better approaches, then give a clear verdict (correct / wrong / conditional). You can read the project files as evidence.\n\n--- ${src}'s output ---\n${srcText}`;
  }
  runOne(target,prompt,note);
}

async function send(){
  let text=box.value.trim();if(!text)return;
  let t=target;
  const m=text.match(/^@(claude|codex|both)\s+/i);
  if(m){t=m[1].toLowerCase();text=text.slice(m[0].length);}
  box.value="";box.style.height="40px";
  const cols=t==="both"?["claude","codex"]:[t];
  cols.forEach(c=>add(c,"user","You",text));
  const thinks={};
  cols.forEach(c=>{tags[c].textContent="thinking…";thinks[c]=add(c,"bot think","","▍ thinking…");});
  try{
    const r=await fetch("/api/send",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({target:t,text})});
    const data=await r.json();
    cols.forEach(c=>{
      thinks[c].remove();tags[c].textContent="idle";
      const res=data[c];
      if(!res){add(c,"bot","System","[no response] "+(data.error||""));return;}
      renderBot(c,res,c+" · "+(res.ms/1000).toFixed(1)+"s");
    });
  }catch(e){cols.forEach(c=>{thinks[c].remove();tags[c].textContent="idle";add(c,"bot","System","[request failed] "+e);});}
}
document.getElementById("send").onclick=send;
box.addEventListener("keydown",e=>{
  if(e.isComposing||e.keyCode===229) return;          // while composing (IME), Enter only confirms
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}
});
box.addEventListener("input",()=>{box.style.height="40px";box.style.height=Math.min(box.scrollHeight,160)+"px";});
document.getElementById("reset").onclick=async()=>{
  await fetch("/api/reset",{method:"POST"});logs.claude.innerHTML="";logs.codex.innerHTML="";
  document.querySelectorAll(".sitem").forEach(x=>x.classList.remove("active"));
};

// ---- shared project directory ----
let curProject=null;
const projlabel=document.getElementById("projlabel");
function renderProj(){
  projlabel.textContent="Project: "+(curProject?curProject.replace(/^.*\/([^/]+)\/?$/,"$1"):"none");
  projlabel.title=curProject||"Shared project directory for both agents";
}
async function postProj(){
  const r=await fetch("/api/project",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({path:curProject||""})});
  const d=await r.json();
  if(d.error){alert(d.error);return false;}
  curProject=d.project;renderProj();return true;
}
document.getElementById("setproj").onclick=async()=>{
  const p=prompt("Project directory both agents work in (absolute path):",curProject||"/Volumes/ADATA/dev/");
  if(p===null)return;
  const old=curProject;curProject=p.trim()||null;
  if(!await postProj()){curProject=old;}
  else{logs.claude.innerHTML="";logs.codex.innerHTML="";
    add("claude","sys","",`Switched to project ${curProject||"(none)"}`);add("codex","sys","",`Switched to project ${curProject||"(none)"}`);}
};
(async()=>{try{const d=await(await fetch("/api/project")).json();curProject=d.project;renderProj();}catch(e){}})();

// ---- per-column model / mode / effort controls (wired to CLI flags) ----
const CFG_OPTS={
  claude:{
    model:[["","Model · default"],["opus","Opus 4.8"],["sonnet","Sonnet 4.6"],["haiku","Haiku 4.5"]],
    mode:[["default","Default"],["acceptEdits","Accept edits"],["plan","Plan"],["bypassPermissions","Bypass"]],
    effort:[["","Effort · default"],["low","Low"],["medium","Medium"],["high","High"],["extra","Extra"],["max","Max"],["ultracode","Ultracode"]]
  },
  codex:{
    model:[["","Model · default"],["gpt-5.5","GPT-5.5"],["gpt-5.4","GPT-5.4"],["gpt-5.4-mini","GPT-5.4-Mini"],["gpt-5.3-codex-spark","GPT-5.3-Codex-Spark"]],
    mode:[["read-only","Read-only"],["workspace-write","Workspace-write"],["danger-full-access","Full access"]],
    effort:[["","Reasoning · default"],["low","Low"],["medium","Medium"],["high","High"],["xhigh","x-High"]]
  }
};
function buildSelect(engine,kind,cur){
  const sel=document.createElement("select");sel.title=kind;
  CFG_OPTS[engine][kind].forEach(([v,label])=>{
    const o=document.createElement("option");o.value=v;o.textContent=label;
    if(v===cur)o.selected=true;sel.appendChild(o);});
  sel.onchange=()=>fetch("/api/agent-config",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({engine,[kind]:sel.value})});
  return sel;
}
(async()=>{
  let cfg={};try{cfg=await(await fetch("/api/agent-config")).json();}catch(e){}
  ["claude","codex"].forEach(e=>{
    const bar=document.querySelector(`.cfgbar[data-e="${e}"]`);if(!bar)return;
    ["model","mode","effort"].forEach(k=>bar.appendChild(buildSelect(e,k,(cfg[e]||{})[k]||"")));
    if(e==="claude"){
      const ft=document.createElement("button");ft.className="fastbtn";ft.textContent="⚡Fast";
      ft.title="Fast mode (Opus only): faster output";
      ft.classList.toggle("on",!!(cfg.claude&&cfg.claude.fast));
      ft.onclick=()=>{const now=!ft.classList.contains("on");ft.classList.toggle("on",now);
        fetch("/api/agent-config",{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({engine:"claude",fast:now})});};
      bar.appendChild(ft);
    }
    const chip=document.createElement("span");chip.className="usechip";chip.id="use-"+e;bar.appendChild(chip);
  });
})();
// + New chat: reset that agent's session + clear its column
document.querySelectorAll(".newlink").forEach(b=>b.onclick=async()=>{
  const e=b.dataset.e;
  await fetch("/api/clear-context",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({engine:e})});
  logs[e].innerHTML="";activeId[e]=null;tags[e].textContent="new chat";
});

// ---- side history rails (auto-sync every second, no repaint if unchanged) ----
const collapsedG={claude:new Set(),codex:new Set()};
const activeId={claude:null,codex:null};
const railSig={claude:null,codex:null};
const railInit={claude:false,codex:false};

async function loadRail(engine,force){
  let rows;
  try{
    const r=await fetch(`/api/sessions?engine=${engine}${hiddenMode[engine]?"&hidden=1":""}`);
    if(!r.ok){if(!railInit[engine])rails[engine].innerHTML=`<div style='padding:10px;color:#e08;font-size:11px'>[HTTP ${r.status}] open http://localhost:8765, not the preview panel</div>`;return;}
    rows=await r.json();
  }catch(e){if(!railInit[engine])rails[engine].innerHTML="[load failed] "+e;return;}
  const sig=JSON.stringify(rows.map(s=>[s.id,s.title||s.first,s.ts,!!s.pinned,!!s.archived,s.project]));
  if(!force && sig===railSig[engine]) return;
  railSig[engine]=sig;
  renderRail(engine,rows);
}

function renderRail(engine,rows){
  const scroll=rails[engine].scrollTop;
  if(!rows.length){rails[engine].innerHTML="<div style='padding:10px;color:#646a80'>(no sessions)</div>";railInit[engine]=true;return;}
  const groups={};
  rows.forEach(s=>{(groups[s.project||s.cwd||"(unknown)"] ||= []).push(s);});
  const order=Object.keys(groups).sort((a,b)=>
    Math.max(...groups[b].map(x=>x.ts))-Math.max(...groups[a].map(x=>x.ts)));
  if(!railInit[engine]) order.forEach((label,gi)=>{if(gi>0)collapsedG[engine].add(label);});  // first paint: expand only the most recent group
  rails[engine].innerHTML="";
  order.forEach((label)=>{
    const list=groups[label].sort((a,b)=>b.ts-a.ts);
    const cwd=list[0].cwd||"";
    const g=document.createElement("div");g.className="sgroup"+(collapsedG[engine].has(label)?" collapsed":"");
    const head=document.createElement("div");head.className="ghead";
    head.innerHTML=`<span class="arr">▾</span><span class="gname" title="${escapeHtml(cwd)}">${escapeHtml(label)}</span><span class="gcount">${list.length}</span>`;
    head.onclick=()=>{g.classList.toggle("collapsed");
      g.classList.contains("collapsed")?collapsedG[engine].add(label):collapsedG[engine].delete(label);};
    g.appendChild(head);
    const body=document.createElement("div");body.className="gbody";
    list.forEach(s=>{
      const el=document.createElement("div");
      el.className="sitem"+(s.pinned?" pin":"")+(s.archived?" arch":"")+(s.id===activeId[engine]?" active":"");
      el.dataset.id=s.id;
      const dt=new Date(s.ts*1000).toLocaleString("en-US",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
      const lab=s.title||s.first||"(untitled)";
      el.title=`${dt} · ${s.id.slice(0,8)}\n${s.cwd||""}`;
      el.innerHTML=`<span class="ico">${s.pinned?"●":"○"}</span><span class="lbl">${escapeHtml(lab)}</span><span class="dots" title="more">⋮</span>`;
      el.onclick=(e)=>{if(e.target.classList.contains("dots")){e.stopPropagation();openMenu(e,engine,s);}else loadSession(engine,s,el);};
      body.appendChild(el);
    });
    g.appendChild(body);
    rails[engine].appendChild(g);
  });
  railInit[engine]=true;
  rails[engine].scrollTop=scroll;
}

async function loadSession(engine,s,el){
  activeId[engine]=s.id;
  rails[engine].querySelectorAll(".sitem").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  tags[engine].textContent="loading…";
  const r=await fetch("/api/load",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({engine,id:s.id,cwd:s.cwd})});
  const data=await r.json();
  logs[engine].innerHTML="";
  (data.transcript||[]).forEach(m=>{
    add(engine,(m.role==="user"?"user":"bot")+" old",m.role==="user"?"You (old)":engine+" (old)",m.text);
  });
  add(engine,"divider","","── history above · continuing below ──");
  tags[engine].textContent="resumed "+s.id.slice(0,6);
}

// ---- per-session ⋮ menu + archived toggle ----
const hiddenMode={claude:false,codex:false};
async function patchSession(engine,id,patch){
  await fetch("/api/session/patch",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({engine,id,patch})});
}
function closeMenu(){document.querySelectorAll(".ctxmenu").forEach(x=>x.remove());}
function openMenu(e,engine,s){
  closeMenu();
  const m=document.createElement("div");m.className="ctxmenu";
  const items=[];
  items.push(["Rename",async()=>{const t=prompt("New name:",s.title||s.first||"");
    if(t!==null){await patchSession(engine,s.id,{title:t.trim()||null});loadRail(engine);}}]);
  items.push([s.pinned?"Unpin":"Pin",async()=>{await patchSession(engine,s.id,{pinned:!s.pinned});loadRail(engine);}]);
  if(s.archived) items.push(["Unarchive",async()=>{await patchSession(engine,s.id,{archived:null});loadRail(engine);}]);
  else items.push(["Archive",async()=>{await patchSession(engine,s.id,{archived:true});loadRail(engine);}]);
  if(s.deleted) items.push(["Restore",async()=>{await patchSession(engine,s.id,{deleted:null});loadRail(engine);}]);
  else items.push(["Remove from Duo|danger",async()=>{if(confirm("Remove from the Duo list?\n(Only affects Duo; the conversation in the official app is not deleted.)")){await patchSession(engine,s.id,{deleted:true});loadRail(engine);}}]);
  items.forEach(([label,fn])=>{const it=document.createElement("div");
    const dg=label.endsWith("|danger");it.className="ci"+(dg?" danger":"");
    it.textContent=dg?label.replace("|danger",""):label;
    it.onclick=async()=>{closeMenu();await fn();};m.appendChild(it);});
  document.body.appendChild(m);
  const r=e.target.getBoundingClientRect();
  m.style.left=Math.min(r.left,window.innerWidth-180)+"px";
  m.style.top=(r.bottom+4)+"px";
  setTimeout(()=>document.addEventListener("click",closeMenu,{once:true}),0);
}
document.querySelectorAll(".rf").forEach(b=>b.onclick=()=>loadRail(b.dataset.e,true));
document.querySelectorAll(".hidtog").forEach(b=>b.onclick=()=>{
  const e=b.dataset.e;hiddenMode[e]=!hiddenMode[e];b.classList.toggle("on",hiddenMode[e]);railSig[e]=null;loadRail(e,true);});
loadRail("claude",true);loadRail("codex",true);
// auto-sync once a second; no repaint when nothing changed, so high frequency doesn't flicker
setInterval(()=>{loadRail("claude");loadRail("codex");},1000);

// ---- top panels: token usage + watchdog ----
function fmtTok(n){return n>=1e9?(n/1e9).toFixed(1)+"B":n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(0)+"K":""+n;}
async function refreshTokens(){
  try{
    const d=await(await fetch("/api/tokens")).json();
    document.getElementById("tcards").innerHTML=["claude","codex"].map(v=>{
      const a=d[v];
      return `<div class="tcard ${v}"><span class="vn">${v==="claude"?"Claude":"Codex"}</span>
        <div class="kgroup">
          <div class="kpi"><b>$${a.cost.toFixed(2)}</b><span>cost</span></div>
          <div class="kpi"><b>${fmtTok(a.total_tokens)}</b><span>tokens</span></div>
          <div class="kpi"><b>${a.cache_pct}%</b><span>cache hit</span></div>
          <div class="kpi"><b>${a.sessions}</b><span>sessions</span></div>
        </div>
        <button class="clearbtn" data-v="${v}" title="Clear ${v} context: next message starts a fresh session and stops re-caching the old context (saves tokens)">Clear cache</button></div>`;
    }).join("");
    document.querySelectorAll(".clearbtn").forEach(b=>b.onclick=()=>clearContext(b.dataset.v));
    ["claude","codex"].forEach(v=>{const c=document.getElementById("use-"+v);
      if(c&&d[v])c.textContent=`$${d[v].cost.toFixed(2)} · cache ${d[v].cache_pct}%`;});
  }catch(e){}
}
async function clearContext(engine){
  if(!confirm(`Clear ${engine}'s conversation context?\nThe next message starts a brand-new session and no longer carries the cached context (saves tokens).\nHistory sessions are not deleted.`))return;
  await fetch("/api/clear-context",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({engine})});
  activeId[engine]=null;
  add(engine,"sys","",`🧹 Cleared ${engine} context; the next message starts a fresh session`);
}
async function refreshBehavior(){
  try{
    const data=await(await fetch("/api/behavior")).json();
    const arr=data.records||[],streak=data.streak||{};
    const el=document.getElementById("bstrip");
    if(!arr.length&&!Object.values(streak).some(v=>v>=3)){
      el.innerHTML='<span class="bnote">Set a project + an agent mode that can write (Accept edits / Workspace-write): each turn compares what the AI claims vs. what actually changed on disk</span>';return;}
    let h="";
    Object.keys(streak).forEach(e=>{
      if(streak[e]>=3)h+=`<span class="bpill circle" title="${streak[e]} turns in a row claiming progress with 0 disk changes; try Clear cache or hand off">🌀 ${e} looping ${streak[e]}×</span>`;
    });
    const warns=arr.filter(r=>r.verdict==="warn"&&!r.circling);
    const okc=arr.filter(r=>r.verdict==="ok").length;
    h+=`<span class="bpill ok">✓ ${okc} consistent</span>`;
    if(warns.length){
      h+=`<span class="bpill warn">⚠ ${warns.length} suspicious</span>`;
      warns.slice(0,2).forEach(r=>{
        let detail=r.reason||"";
        const miss=r.claims.filter(c=>c.status==="missing"||c.status==="empty").map(c=>c.path).join(", ");
        if(miss)detail+=": "+miss;
        h+=`<span class="bpill warn" title="${escapeHtml(r.engine+" · "+detail)}">${r.engine}: ${escapeHtml(detail).slice(0,48)}</span>`;
      });
    }
    el.innerHTML=h;
  }catch(e){}
}
setInterval(refreshTokens,15000);refreshTokens();
setInterval(refreshBehavior,2000);refreshBehavior();

// ---- the "+" left of the input: per-target file add (upload / drag / browse project) ----
const plusbtn=document.getElementById("plusbtn");
function closePop(){document.querySelectorAll(".popmenu").forEach(x=>x.remove());
  document.removeEventListener("mousedown",docClose,true);}
function docClose(e){if(!e.target.closest(".popmenu")&&e.target!==plusbtn)closePop();}
function placePop(m){const r=plusbtn.getBoundingClientRect();
  m.style.left=Math.min(r.left,window.innerWidth-m.offsetWidth-8)+"px";
  let top=r.top-m.offsetHeight-6;if(top<8)top=r.bottom+6;m.style.top=top+"px";
  document.addEventListener("mousedown",docClose,true);}
function insertRef(engine,rel){
  const ref=(engine==="claude"?"@":"")+rel+" ";
  const s=box.selectionStart??box.value.length;
  box.value=box.value.slice(0,s)+ref+box.value.slice(s);
  box.focus();box.dispatchEvent(new Event("input"));
}
async function openFileBrowser(engine,rel){
  closePop();
  const m=document.createElement("div");m.className="popmenu";document.body.appendChild(m);
  m.innerHTML='<div class="pmhead">Loading…</div>';placePop(m);
  let data={};try{data=await(await fetch("/api/files?dir="+encodeURIComponent(rel||""))).json();}catch(e){}
  m.innerHTML="";
  const head=document.createElement("div");head.className="pmhead";
  head.innerHTML=`<span class="ic">⚡</span>${engine==="claude"?"Claude":"Codex"} · add · /${escapeHtml(data.rel||"")}`;
  m.appendChild(head);
  if(data.rel){
    const up=document.createElement("div");up.className="pmi";up.innerHTML='<span class="ic">↑</span>Up';
    up.onclick=()=>openFileBrowser(engine,data.rel.split("/").slice(0,-1).join("/"));m.appendChild(up);
  }
  (data.entries||[]).forEach(en=>{
    const it=document.createElement("div");it.className="pmi";
    it.innerHTML=`<span class="ic">${en.dir?"📁":"📄"}</span>${escapeHtml(en.name)}`;
    const childRel=(data.rel?data.rel+"/":"")+en.name;
    it.onclick=()=>{if(en.dir)openFileBrowser(engine,childRel);else{insertRef(engine,childRel);closePop();}};
    m.appendChild(it);
  });
  if(!(data.entries||[]).length){const e=document.createElement("div");e.className="pmhead";
    e.textContent=data.base?"(no files here)":"(set a project directory first)";m.appendChild(e);}
  placePop(m);
}
function chooseAgentThen(cb){
  closePop();
  const m=document.createElement("div");m.className="popmenu";document.body.appendChild(m);
  m.innerHTML='<div class="pmhead">Add to which</div>';
  [["claude","Claude","cl"],["codex","Codex","cx"]].forEach(([e,label,cls])=>{
    const it=document.createElement("div");it.className="pmi "+cls;
    it.innerHTML=`<span class="ic">⚡</span>${label}`;it.onclick=()=>cb(e);m.appendChild(it);
  });
  placePop(m);
}
function showPlusMenu(engine){
  closePop();
  const m=document.createElement("div");m.className="popmenu";document.body.appendChild(m);
  m.innerHTML=`<div class="pmhead"><span class="ic">⚡</span>${engine==="claude"?"Claude":"Codex"} · add files</div>`;
  const up=document.createElement("div");up.className="pmi";up.innerHTML='<span class="ic">📤</span>Upload from computer…';
  up.onclick=()=>{closePop();pickFiles(engine);};m.appendChild(up);
  const br=document.createElement("div");br.className="pmi";br.innerHTML='<span class="ic">📁</span>Browse project files';
  br.onclick=()=>openFileBrowser(engine,"");m.appendChild(br);
  placePop(m);
}
plusbtn.onclick=()=>{
  if(document.querySelector(".popmenu")){closePop();return;}
  if(target==="both")chooseAgentThen(showPlusMenu);
  else showPlusMenu(target);
};

// ---- file upload (picker + drag-drop) ----
const fileinput=document.getElementById("fileinput");
let pendingEngine="claude";
function pickFiles(engine){pendingEngine=engine;fileinput.value="";fileinput.click();}
fileinput.onchange=()=>uploadFiles(pendingEngine,fileinput.files);
async function uploadFile(engine,file){
  try{
    const buf=await file.arrayBuffer();
    const r=await fetch("/api/upload",{method:"POST",headers:{"X-Filename":encodeURIComponent(file.name)},body:buf});
    const d=await r.json();
    if(d.ok)insertRef(engine,d.rel); else alert("Upload failed: "+(d.error||""));
  }catch(e){alert("Upload failed: "+e);}
}
async function uploadFiles(engine,files){for(const f of files)await uploadFile(engine,f);}

const iw=document.querySelector(".inputwrap");
["dragenter","dragover"].forEach(ev=>iw.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();iw.classList.add("drag");}));
["dragleave","dragend"].forEach(ev=>iw.addEventListener(ev,e=>{if(e.target===iw)iw.classList.remove("drag");}));
iw.addEventListener("drop",e=>{e.preventDefault();e.stopPropagation();iw.classList.remove("drag");
  if(e.dataTransfer.files.length)uploadFiles(target==="both"?"claude":target,e.dataTransfer.files);});
</script>
